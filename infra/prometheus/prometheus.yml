global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: rc-service
    scheme: https
    metrics_path: /RC/rc_details_get_and_store/api/metrics
    static_configs:
      - targets: ["vi-api.vehicleinfo.app"]
        labels:
          service: rc-service
          provider: rc-provider
          environment: staging

  # Temporary local testing fallback while RC metrics access is restricted.
  # Remove this job after vi-api.vehicleinfo.app allows Prometheus to scrape RC metrics.
  - job_name: rc-service-webhook-fallback
    scheme: https
    metrics_path: /webhook/api/metrics
    static_configs:
      - targets: ["webhook.vehicleinfo.app"]
        labels:
          service: rc-service
          provider: rc-provider
          environment: staging
          source_service: webhook-test-fallback
